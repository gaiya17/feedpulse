services:
  
  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
    depends_on:
      - backend

  
  backend:
    build: ./backend
    restart: always
    ports:
      - "4000:4000"
    environment:
     
      - MONGO_URI=mongodb://mongo:27017/feedpulse
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      - mongo

  
  mongo:
    image: mongo:7
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: